<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        Bootstrap Structure and Files
    </title>

    <link
        rel="stylesheet"
        href="bootstrap/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h1 class="text-primary">

            Bootstrap JavaScript Plugins Demo

        </h1>

        <p class="lead">

            This page demonstrates Bootstrap bundle integration.

        </p>

        <!-- Collapse Button -->

        <button class="btn btn-success"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#demoContent">

            Show More

        </button>

        <!-- Collapsible Content -->

        <div class="collapse mt-3"
             id="demoContent">

            <div class="card card-body">

                Bootstrap JavaScript plugins are working successfully.

            </div>

        </div>

    </div>

    <!-- Bootstrap Bundle JS -->

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>

</html>
