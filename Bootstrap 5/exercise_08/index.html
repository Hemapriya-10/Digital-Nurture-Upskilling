<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        Bootstrap Forms
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <!-- Exercise 8.1 -->

        <h1 class="text-primary text-center mb-4">

            Exercise 8.1 - Registration Form

        </h1>

        <div class="card p-4 shadow">

            <form>

                <!-- Name -->

                <div class="mb-3">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input type="text"
                           class="form-control"
                           placeholder="Enter your name">

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label class="form-label">

                        Email Address

                    </label>

                    <input type="email"
                           class="form-control"
                           placeholder="Enter your email">

                </div>

                <!-- Phone Input Group -->

                <div class="mb-3">

                    <label class="form-label">

                        Phone Number

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            +91

                        </span>

                        <input type="text"
                               class="form-control"
                               placeholder="9876543210">

                    </div>

                </div>

                <!-- Gender -->

                <div class="mb-3">

                    <label class="form-label">

                        Gender

                    </label>

                    <div class="form-check">

                        <input class="form-check-input"
                               type="radio"
                               name="gender">

                        <label class="form-check-label">

                            Male

                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input"
                               type="radio"
                               name="gender">

                        <label class="form-check-label">

                            Female

                        </label>

                    </div>

                </div>

                <!-- Terms -->

                <div class="form-check mb-3">

                    <input class="form-check-input"
                           type="checkbox">

                    <label class="form-check-label">

                        I agree to the terms and conditions

                    </label>

                </div>

                <button class="btn btn-success">

                    Register

                </button>

            </form>

        </div>

        <hr class="my-5">

        <!-- Exercise 8.2 -->

        <h1 class="text-success text-center mb-4">

            Exercise 8.2 - Login Form

        </h1>

        <div class="card p-4 shadow">

            <form>

                <div class="form-floating mb-3">

                    <input type="email"
                           class="form-control"
                           id="email"
                           placeholder="name@example.com">

                    <label for="email">

                        Email Address

                    </label>

                </div>

                <div class="form-floating mb-3">

                    <input type="password"
                           class="form-control"
                           id="password"
                           placeholder="Password">

                    <label for="password">

                        Password

                    </label>

                </div>

                <button class="btn btn-primary">

                    Login

                </button>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
