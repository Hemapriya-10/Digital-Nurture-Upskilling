<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        Bootstrap Buttons
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <!-- Exercise 9.1 -->

        <h1 class="text-center text-primary mb-4">

            Exercise 9.1 - Contextual Buttons

        </h1>

        <div class="mb-5">

            <button class="btn btn-primary m-1">
                Primary
            </button>

            <button class="btn btn-secondary m-1">
                Secondary
            </button>

            <button class="btn btn-success m-1">
                Success
            </button>

            <button class="btn btn-danger m-1">
                Danger
            </button>

            <button class="btn btn-warning m-1">
                Warning
            </button>

            <button class="btn btn-info m-1">
                Info
            </button>

            <button class="btn btn-light m-1">
                Light
            </button>

            <button class="btn btn-dark m-1">
                Dark
            </button>

        </div>

        <h3 class="mb-3">

            Outline Buttons

        </h3>

        <div class="mb-5">

            <button class="btn btn-outline-primary m-1">
                Outline Primary
            </button>

            <button class="btn btn-outline-success m-1">
                Outline Success
            </button>

            <button class="btn btn-outline-danger m-1">
                Outline Danger
            </button>

            <button class="btn btn-outline-dark m-1">
                Outline Dark
            </button>

        </div>

        <hr class="my-5">

        <!-- Exercise 9.2 -->

        <h1 class="text-center text-success mb-4">

            Exercise 9.2 - Button Groups & Toggle Buttons

        </h1>

        <!-- Button Group -->

        <div class="btn-group mb-4">

            <button class="btn btn-primary">
                Home
            </button>

            <button class="btn btn-primary">
                Events
            </button>

            <button class="btn btn-primary">
                Contact
            </button>

        </div>

        <!-- Toggle Buttons -->

        <div>

            <input type="checkbox"
                   class="btn-check"
                   id="music">

            <label class="btn btn-outline-success"
                   for="music">

                Music

            </label>

            <input type="checkbox"
                   class="btn-check"
                   id="sports">

            <label class="btn btn-outline-primary"
                   for="sports">

                Sports

            </label>

            <input type="checkbox"
                   class="btn-check"
                   id="technology">

            <label class="btn btn-outline-danger"
                   for="technology">

                Technology

            </label>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
