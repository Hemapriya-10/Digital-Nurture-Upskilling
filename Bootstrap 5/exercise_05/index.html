<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        Bootstrap Alignment and Reordering
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <!-- Exercise 5.1 -->

        <h1 class="text-center text-primary mb-4">

            Exercise 5.1 - Center Alignment

        </h1>

        <div class="row justify-content-center align-items-center bg-light border"
             style="height: 250px;">

            <div class="col-4">

                <div class="bg-success text-white text-center p-4 rounded">

                    Centered Content

                </div>

            </div>

        </div>

        <hr class="my-5">

        <!-- Exercise 5.2 -->

        <h1 class="text-center text-danger mb-4">

            Exercise 5.2 - Column Reordering

        </h1>

        <div class="row">

            <!-- First Column -->

            <div class="col-md-6 order-md-2">

                <div class="bg-warning text-dark p-4 rounded text-center">

                    First Column
                    <br>
                    (Appears Second on Desktop)

                </div>

            </div>

            <!-- Second Column -->

            <div class="col-md-6 order-md-1">

                <div class="bg-info text-white p-4 rounded text-center">

                    Second Column
                    <br>
                    (Appears First on Desktop)

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
