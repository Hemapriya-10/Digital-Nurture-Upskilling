<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 16 - Positioning Utilities</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container my-5">

        <!-- Exercise 16.1 -->
        <h1 class="text-center mb-4">
            Fixed Footer Example
        </h1>

        <div class="bg-light p-4 border rounded mb-5">
            <p>
                Scroll the page and notice that the footer remains
                fixed at the bottom of the screen.
            </p>

            <p>
                This demonstrates the Bootstrap classes
                <strong>position-fixed</strong> and
                <strong>bottom-0</strong>.
            </p>
        </div>

        <hr class="my-5">

        <!-- Exercise 16.2 -->
        <h1 class="text-center mb-4">
            Image with Overlay Badge
        </h1>

        <div class="d-flex justify-content-center">

            <div class="position-relative">

                <img
                    src="https://via.placeholder.com/300"
                    alt="Sample Image"
                    class="img-fluid rounded">

                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    New
                </span>

            </div>

        </div>

    </div>

    <!-- Fixed Footer -->
    <footer class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center py-3">
        © 2026 Bootstrap Positioning Utilities Demo
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
