<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        Bootstrap Navbars and Navigation
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <!-- Exercise 10.1 -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="#">

                Community Portal

            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarContent">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="navbarContent">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Events
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Services
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Contact
                        </a>
                    </li>

                </ul>

                <form class="d-flex">

                    <input
                        class="form-control me-2"
                        type="search"
                        placeholder="Search">

                    <button
                        class="btn btn-success"
                        type="submit">

                        Search

                    </button>

                </form>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <h1 class="text-center text-primary mb-4">

            Exercise 10.2 - Navigation Styles

        </h1>

        <!-- Basic Nav -->

        <h3>Basic Navigation</h3>

        <ul class="nav mb-4">

            <li class="nav-item">
                <a class="nav-link active" href="#">
                    Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Events
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Contact
                </a>
            </li>

        </ul>

        <!-- Nav Tabs -->

        <h3>Nav Tabs</h3>

        <ul class="nav nav-tabs mb-4">

            <li class="nav-item">
                <a class="nav-link active" href="#">
                    Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Events
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Contact
                </a>
            </li>

        </ul>

        <!-- Nav Pills -->

        <h3>Nav Pills</h3>

        <ul class="nav nav-pills">

            <li class="nav-item">
                <a class="nav-link active" href="#">
                    Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Events
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Contact
                </a>
            </li>

        </ul>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
