<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        Bootstrap Responsive Flexbox Utilities
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <div class="container mt-4">

        <!-- Exercise 6.1 -->

        <h1 class="text-primary text-center mb-4">

            Exercise 6.1 - Responsive Navbar

        </h1>

        <nav class="d-flex flex-column flex-md-row bg-dark p-3 rounded">

            <a href="#"
               class="text-white text-decoration-none p-2">

                Home

            </a>

            <a href="#"
               class="text-white text-decoration-none p-2">

                About

            </a>

            <a href="#"
               class="text-white text-decoration-none p-2">

                Services

            </a>

            <a href="#"
               class="text-white text-decoration-none p-2">

                Contact

            </a>

        </nav>

        <hr class="my-5">

        <!-- Exercise 6.2 -->

        <h1 class="text-success text-center mb-4">

            Exercise 6.2 - Card Layout

        </h1>

        <div class="card shadow">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div>

                    <h4 class="card-title">

                        Community Event

                    </h4>

                    <p class="card-text">

                        Join our annual community celebration.

                    </p>

                </div>

                <button class="btn btn-primary">

                    Register

                </button>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
