<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 15 - Borders, Shadows and Rounded Corners</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container my-5">

        <!-- Exercise 15.1 -->
        <h1 class="text-center mb-4">
            Borders and Rounded Circle Image
        </h1>

        <div class="text-center mb-5">

            <img
                src="https://via.placeholder.com/250"
                alt="Profile Image"
                class="img-fluid border border-primary border-3 rounded-circle p-2">

            <p class="mt-3">
                Image with border, border-primary, border-3 and rounded-circle.
            </p>

        </div>

        <hr class="my-5">

        <!-- Exercise 15.2 -->
        <h1 class="text-center mb-4">
            Card with Shadow and Rounded Pill Button
        </h1>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg">

                    <div class="card-body text-center">

                        <h3 class="card-title">
                            Premium Membership
                        </h3>

                        <p class="card-text">
                            Get access to exclusive content,
                            priority support, and premium features.
                        </p>

                        <button class="btn btn-primary rounded-pill px-4">
                            Join Now
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
